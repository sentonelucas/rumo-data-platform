# .github/workflows/ci.yml
# Pipeline de CI — executa em todo Pull Request para main/develop
#
# Checks:
#   1. Lint Python (ruff) — detecta erros e estilo
#   2. Testes unitários dos jobs Glue (pytest + moto)
#   3. Validação de DAGs Airflow (import sem erros)
#   4. dbt parse + dbt test (em schema de CI isolado)
#   5. Terraform validate (valida sintaxe sem criar recursos)

name: CI — Pull Request Checks

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'glue_jobs/**'
      - 'airflow/**'
      - 'dbt/**'
      - 'terraform/**'
      - 'lambda/**'
      - '.github/workflows/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true   # Cancela runs antigas do mesmo PR

env:
  PYTHON_VERSION: "3.11"
  AWS_REGION: "us-east-1"

jobs:
  # ─────────────────────────────────────────────────────────────────────
  # JOB 1: Lint & Static Analysis
  # ─────────────────────────────────────────────────────────────────────
  lint:
    name: "Lint Python (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff lint
        run: ruff check glue_jobs/ lambda/ airflow/

      - name: Run ruff format check
        run: ruff format --check glue_jobs/ lambda/ airflow/

  # ─────────────────────────────────────────────────────────────────────
  # JOB 2: Unit Tests (Glue Jobs + Lambda)
  # ─────────────────────────────────────────────────────────────────────
  unit-tests:
    name: "Unit Tests (pytest + moto)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install test dependencies
        run: |
          pip install \
            pytest pytest-cov pytest-mock \
            moto[s3,kinesis,dynamodb,glue,cloudwatch,sns] \
            boto3 pyspark==3.4.0

      - name: Run unit tests
        run: |
          pytest tests/ \
            -v \
            --cov=glue_jobs --cov=lambda \
            --cov-report=xml \
            --cov-fail-under=70 \
            -x   # Para no primeiro erro
        env:
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          AWS_ACCESS_KEY_ID: "test"
          AWS_SECRET_ACCESS_KEY: "test"

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────────────────────────────
  # JOB 3: Airflow DAG Validation
  # ─────────────────────────────────────────────────────────────────────
  airflow-validate:
    name: "Airflow DAG Validation"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Airflow + providers
        run: |
          pip install \
            "apache-airflow==2.9.0" \
            "apache-airflow-providers-amazon==8.0.0" \
            --constraint "https://raw.githubusercontent.com/apache/airflow/constraints-2.9.0/constraints-3.11.txt"

      - name: Validate DAG imports (no syntax errors)
        run: |
          python -c "
          import glob, importlib.util, sys
          errors = []
          for dag_file in glob.glob('airflow/dags/*.py'):
              spec = importlib.util.spec_from_file_location('dag', dag_file)
              mod = importlib.util.module_from_spec(spec)
              try:
                  spec.loader.exec_module(mod)
                  print(f'OK  {dag_file}')
              except Exception as e:
                  errors.append(f'FAIL {dag_file}: {e}')
                  print(f'FAIL {dag_file}: {e}')
          if errors:
              sys.exit(1)
          "

      - name: Check for missing required DAG attributes
        run: |
          python -c "
          import ast, glob, sys
          required = ['dag_id', 'schedule_interval', 'default_args']
          for f in glob.glob('airflow/dags/*.py'):
              src = open(f).read()
              for attr in required:
                  if attr not in src:
                      print(f'WARN {f}: missing {attr}')
          "

  # ─────────────────────────────────────────────────────────────────────
  # JOB 4: dbt Parse + Compile (sem executar contra banco real)
  # ─────────────────────────────────────────────────────────────────────
  dbt-validate:
    name: "dbt Parse & Compile"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dbt
        run: pip install dbt-redshift==1.8.0

      - name: dbt deps
        working-directory: dbt/
        run: dbt deps

      - name: dbt parse (valida YAML e Jinja sem banco)
        working-directory: dbt/
        run: dbt parse --profiles-dir .
        env:
          DBT_TARGET: ci
          REDSHIFT_HOST: "localhost"    # Não conecta de fato — só parse
          REDSHIFT_USER: "ci"
          REDSHIFT_PASSWORD: "ci"

      - name: Check model documentation (todos os models devem ter description)
        working-directory: dbt/
        run: |
          python3 -c "
          import yaml, glob, sys
          undocumented = []
          for f in glob.glob('models/**/schema.yml', recursive=True):
              schema = yaml.safe_load(open(f))
              for model in (schema or {}).get('models', []):
                  if not model.get('description'):
                      undocumented.append(f'{f}: {model[\"name\"]}')
          if undocumented:
              print('Models sem description:')
              for u in undocumented: print(f'  - {u}')
              sys.exit(1)
          else:
              print('Todos os models estao documentados.')
          "

  # ─────────────────────────────────────────────────────────────────────
  # JOB 5: Terraform Validate
  # ─────────────────────────────────────────────────────────────────────
  terraform-validate:
    name: "Terraform Validate"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.8.0"

      - name: Terraform Init (só backend config, sem state real)
        working-directory: terraform/
        run: terraform init -backend=false

      - name: Terraform Validate
        working-directory: terraform/
        run: terraform validate

      - name: Terraform Format Check
        working-directory: terraform/
        run: terraform fmt -check -recursive

  # ─────────────────────────────────────────────────────────────────────
  # JOB FINAL: Status Check (required para merge)
  # ─────────────────────────────────────────────────────────────────────
  ci-success:
    name: "CI Passed"
    runs-on: ubuntu-latest
    needs: [lint, unit-tests, airflow-validate, dbt-validate, terraform-validate]
    if: always()
    steps:
      - name: Check all jobs passed
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            echo "One or more CI jobs failed."
            exit 1
          fi
          echo "All CI checks passed."
